name: Deploy Web Statis to Docker Hub & AWS EC2

on:
  push:
    branches:
      - main
    paths:
      - 'Web_Statis/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-statis.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push image statis
        uses: docker/build-push-action@v5
        with:
          context: ./Web_Statis
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/uas_statis:latest

      - name: Copy compose and sql files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/project/UAS-ADM"

      - name: Deploy to AWS EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/ubuntu/project/UAS-ADM
            docker compose pull uas_statis
            docker compose stop uas_statis || true
            docker compose rm -f uas_statis || true
            docker compose up -d uas_statis
            echo "[statis] deployed at $(date)"